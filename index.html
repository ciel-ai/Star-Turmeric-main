    <script>
      // GitHub Pages SPA fix — restores the path encoded by 404.html
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, decoded + (l.hash || ""));
        }
      })(window.location);
    </script>
