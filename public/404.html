<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Star Turmeric</title>
    <script>
      // GitHub Pages SPA fix — redirects unknown paths back to index.html
      // with the original path stored as a query param so React Router can pick it up.
      // Set pathSegmentsToKeep = 1 if deploying to a subdirectory (e.g. username.github.io/repo).
      // Set pathSegmentsToKeep = 0 if deploying to a custom root domain.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
